site_name: jailoc
site_url: https://zensical.org/
site_description: Sandboxed Docker Compose environments for headless OpenCode coding agents
site_dir: public
repo_url: https://github.com/seznam/jailoc
repo_name: seznam/jailoc

theme:
  name: material
  language: cs
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest

extra_css:
  - stylesheets/extra.css

nav:
  - Domů: index.md
  - Začínáme: getting-started.md
  - Konfigurace: configuration.md
  - CLI příkazy: cli-reference.md
  - Vlastní image: custom-images.md
  - Síťová izolace: network-isolation.md
  - Architektura: architecture.md
  - Vývoj: development.md
  - Instalace: downloads.md
